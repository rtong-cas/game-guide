<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏资讯 - GameGuide</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">🎮 GameGuide</a>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="games.html">游戏库</a>
        <a href="news.html" class="active">游戏资讯</a>
        <a href="about.html">关于</a>
      </nav>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索游戏、攻略、资讯..." onkeydown="if(event.key==='Enter') searchGame()">
        <button onclick="searchGame()">🔍</button>
      </div>
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>
  </header>

  <div class="news-page">
    <div class="container">
      <div class="page-header">
        <h1>📰 游戏资讯</h1>
        <p style="color:#7a7a9a;">最新游戏行业动态、新作情报、优惠信息</p>
      </div>
      <div class="news-carousel" id="allNews"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-col"><h4>🎮 GameGuide</h4><p>全自动游戏攻略站<br>AI 采集整理，持续更新</p></div>
        <div class="footer-col"><h4>快速链接</h4><a href="games.html">游戏库</a><a href="news.html">游戏资讯</a><a href="about.html">关于本站</a></div>
        <div class="footer-col"><h4>热门游戏</h4><a href="game.html?id=wukong">黑神话：悟空</a><a href="game.html?id=elden-ring">艾尔登法环</a><a href="game.html?id=doom-tda">DOOM 黑暗时代</a></div>
        <div class="footer-col"><h4>免责声明</h4><p style="font-size:0.8rem;color:#5a5a7a;">本站内容由AI自动整理，仅供参考。</p></div>
      </div>
      <div class="footer-bottom"><p>© 2026 GameGuide - 全自动游戏攻略站 | Powered by AI 🤖</p></div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const el = document.getElementById('allNews');
      if (el && gamesData.news) {
        el.innerHTML = gamesData.news.map(n => `
          <div class="news-card">
            <span class="news-tag">${n.tag}</span>
            <h3>${n.title}</h3>
            <p>${n.desc}</p>
            <div class="news-meta">📅 ${n.date}</div>
          </div>
        `).join('');
      }
    });
  </script>
</body>
</html>
