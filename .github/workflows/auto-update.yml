name: 🎮 GameGuide 自动更新

on:
  schedule:
    # 每天 10:00 和 22:00（北京时间）运行
    - cron: '0 2,14 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 运行自动更新脚本
        id: update
        env:
          # 如果配置了AI API key，可以自动生成攻略内容
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/update.py

      - name: 读取更新报告
        id: report
        run: |
          cat update-report.md >> $GITHUB_STEP_SUMMARY

      - name: 提交和推送更新
        run: |
          git config user.name "GameGuide Bot"
          git config user.email "bot@game-guide.games"
          git add -A
          # 如果没有变化就跳过
          if git diff --cached --quiet; then
            echo "没有新的更新内容"
            exit 0
          fi
          git commit -m "🤖 自动更新 $(date +'%Y-%m-%d %H:%M')"
          git push
